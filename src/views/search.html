<div class="space-y-6">
  <header>
    <h1 class="text-2xl font-bold text-gray-900">Search</h1>
    <p class="text-sm text-gray-500 mt-1">Find clients, meetings, and action items in one place.</p>
  </header>

  <form method="get" action="/search" class="flex gap-2">
    <input
      type="search"
      name="q"
      value="{{query}}"
      placeholder="Search across clients, meetings, briefings, action items…"
      autofocus
      maxlength="200"
      class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
    />
    <button
      type="submit"
      class="px-5 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700"
    >
      Search
    </button>
  </form>

  {{{summaryHtml}}}
  {{{resultsHtml}}}
</div>
