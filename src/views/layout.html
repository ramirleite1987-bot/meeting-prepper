<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}} - Meeting Prepper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center gap-4">
        <a href="/" class="text-xl font-bold text-indigo-600 whitespace-nowrap">Meeting Prepper</a>
        <form method="get" action="/search" class="flex-1 max-w-lg hidden md:block">
          <input
            type="search"
            name="q"
            placeholder="Search clients, meetings, action items…"
            maxlength="200"
            class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </form>
        <div class="flex items-center space-x-4 whitespace-nowrap">
          <a href="/" class="text-gray-700 hover:text-indigo-600 font-medium">Dashboard</a>
          <a href="/agenda" class="text-gray-700 hover:text-indigo-600 font-medium">Agenda</a>
          <a href="/action-items" class="text-gray-700 hover:text-indigo-600 font-medium">Action items</a>
          <a href="/stats" class="text-gray-700 hover:text-indigo-600 font-medium">Stats</a>
          <button onclick="document.getElementById('add-meeting-modal').classList.remove('hidden')" class="inline-flex items-center px-3 py-1.5 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition">+ Meeting</button>
          <div class="relative" id="notification-bell">
            <button onclick="toggleNotifications()" class="relative p-1 text-gray-500 hover:text-indigo-600 transition">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
              </svg>
              <span id="notification-badge" class="hidden absolute -top-1 -right-1 h-4 w-4 rounded-full bg-red-500 text-white text-xs flex items-center justify-center">0</span>
            </button>
            <div id="notification-dropdown" class="hidden absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg border border-gray-200 z-50">
              <div class="p-3 border-b border-gray-200">
                <h3 class="text-sm font-semibold text-gray-800">Notifications</h3>
              </div>
              <div id="notification-list" class="max-h-64 overflow-y-auto">
                <p class="p-3 text-sm text-gray-500">No notifications yet.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {{content}}
  </main>
  <script src="/app.js"></script>
  <script src="/prepare-context.js"></script>
</body>
</html>
