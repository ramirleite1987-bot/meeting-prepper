<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}} - Meeting Prepper</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center gap-4">
        <a href="/" class="text-xl font-bold text-indigo-600 whitespace-nowrap">Meeting Prepper</a>
        <form method="get" action="/search" class="flex-1 max-w-lg hidden md:block">
          <input
            type="search"
            name="q"
            placeholder="Search clients, meetings, action items…"
            maxlength="200"
            class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </form>
        <div class="flex space-x-6 whitespace-nowrap">
          <a href="/" class="text-gray-700 hover:text-indigo-600 font-medium">Dashboard</a>
          <a href="/search" class="text-gray-700 hover:text-indigo-600 font-medium">Search</a>
        </div>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {{content}}
  </main>
</body>
</html>
