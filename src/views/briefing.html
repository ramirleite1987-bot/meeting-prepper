<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <a href="/" class="text-indigo-600 hover:text-indigo-800 text-sm">&larr; Back to Dashboard</a>
      <h1 class="text-2xl font-bold text-gray-900 mt-2">{{meeting.title}}</h1>
      <p class="text-gray-500">{{meeting.client_name}} &middot; {{meeting.scheduled_at}}</p>
    </div>
    <div class="flex space-x-2">
      <form method="POST" action="/briefing/{{meeting.id}}/prepare">
        <button type="submit" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Regenerate Briefing</button>
      </form>
      <a href="/post-call/{{meeting.id}}" class="px-4 py-2 text-sm border border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-50">Post-Call Review</a>
    </div>
  </div>

  {{{briefingHtml}}}

  {{#if hasNoBriefing}}
  <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center">
    <p class="text-yellow-800">No briefing has been generated yet.</p>
    <form method="POST" action="/briefing/{{meeting.id}}/prepare" class="mt-4">
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Generate Briefing</button>
    </form>
  </div>
  {{/if}}
</div>
